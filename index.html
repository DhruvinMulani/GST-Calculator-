<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi GST Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px;
}

.wrapper { width: 100%; max-width: 700px; }

.card {
  background: #fff;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

h2 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 600;
}

.input-grid {
  display: grid;
  gap: 20px;
  margin-bottom: 20px;
}

input {
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  width: 100%;
  transition: 0.3s;
}

input:focus {
  outline: none;
  border-color: #4e73df;
  box-shadow: 0 0 0 3px rgba(78,115,223,0.15);
}

.section {
  background: #f8f9ff;
  padding: 20px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 20px;
  display: none;
}

.total-box {
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  color: #fff;
  padding: 25px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.8;
  margin-bottom: 25px;
  display: none;
}

.button-container { text-align: center; }

.download-btn {
  background: #222;
  color: #fff;
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
  opacity: 0.5;
}

.download-btn.active {
  opacity: 1;
}

.download-btn:hover.active {
  background: #000;
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card" id="captureArea">

    <h2>Multi GST Calculator</h2>

    <div class="input-grid">
      <input type="number" id="baseAmount" placeholder="Enter Base Amount" oninput="calculate()">
      <input type="number" id="rate1" placeholder="GST % 1" oninput="calculate()">
      <input type="number" id="rate2" placeholder="GST % 2" oninput="calculate()">
      <input type="number" id="rate3" placeholder="GST % 3" oninput="calculate()">
    </div>

    <div class="section" id="section1"></div>
    <div class="section" id="section2"></div>
    <div class="section" id="section3"></div>

    <div class="total-box" id="grandTotal"></div>

    <div class="button-container">
      <button class="download-btn" id="downloadBtn" onclick="downloadImage()" disabled>
        Download Calculation as Image
      </button>
    </div>

  </div>
</div>

<script>
function calculateGST(base, rate) {
  var gst = (base * rate) / 100;
  var half = gst / 2;
  return { gst, cgst: half, sgst: half };
}

function calculate() {
  var base = parseFloat(document.getElementById("baseAmount").value);
  var r1 = parseFloat(document.getElementById("rate1").value);
  var r2 = parseFloat(document.getElementById("rate2").value);
  var r3 = parseFloat(document.getElementById("rate3").value);

  var totalGST = 0;
  var totalCGST = 0;
  var totalSGST = 0;
  var hasAnyResult = false;

  function process(rate, sectionId) {
    if (base && rate) {
      var result = calculateGST(base, rate);

      document.getElementById(sectionId).innerHTML =
        "<strong>GST Amount:</strong> ₹ " + result.gst.toFixed(2) + "<br>" +
        "<strong>CGST:</strong> ₹ " + result.cgst.toFixed(2) + "<br>" +
        "<strong>SGST:</strong> ₹ " + result.sgst.toFixed(2);

      document.getElementById(sectionId).style.display = "block";

      totalGST += result.gst;
      totalCGST += result.cgst;
      totalSGST += result.sgst;
      hasAnyResult = true;
    } else {
      document.getElementById(sectionId).style.display = "none";
    }
  }

  process(r1, "section1");
  process(r2, "section2");
  process(r3, "section3");

  if (hasAnyResult) {
    var finalAmount = base + totalGST;

    document.getElementById("grandTotal").innerHTML =
      "<strong>Total of All Three</strong><br><br>" +
      "GST Amount: ₹ " + totalGST.toFixed(2) + "<br>" +
      "Total Amount: ₹ " + finalAmount.toFixed(2) + "<br>" +
      "CGST: ₹ " + totalCGST.toFixed(2) + "<br>" +
      "SGST: ₹ " + totalSGST.toFixed(2);

    document.getElementById("grandTotal").style.display = "block";
    document.getElementById("downloadBtn").disabled = false;
    document.getElementById("downloadBtn").classList.add("active");
  } else {
    document.getElementById("grandTotal").style.display = "none";
    document.getElementById("downloadBtn").disabled = true;
    document.getElementById("downloadBtn").classList.remove("active");
  }
}

function downloadImage() {
  html2canvas(document.getElementById("captureArea")).then(canvas => {
    var link = document.createElement("a");
    link.download = "GST_Calculation.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
